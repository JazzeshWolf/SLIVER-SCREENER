name: Refresh MCX data

# Free "serverless backend": fetches MCX data during market hours, computes
# OI/IV/basis, and commits public/data/latest.json + history.jsonl.
on:
  schedule:
    # Every 10 min, ~09:00–23:30 IST (03:30–18:00 UTC), Mon–Fri.
    # Offset off the top of the hour (:03/:13/… not :00/:10/…): GitHub delays or
    # drops scheduled runs that land on :00 (platform-wide load spike), so this
    # offset meaningfully improves how often the auto-refresh actually fires.
    # NOTE: markets are closed weekends, so Sat/Sun the app intentionally shows
    # Friday's last data — that is not a fault.
    - cron: "3,13,23,33,43,53 3-18 * * 1-5"
  workflow_dispatch: {} # manual trigger for testing
  push:
    # Rebuild data on code changes (e.g. fetcher tweaks) — ignore data-only
    # commits to avoid a self-trigger loop.
    branches: ["claude/wizardly-pasteur-58a976"]
    paths-ignore:
      - "public/data/**"

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build data snapshot
        env:
          # Upstox 1-year read-only "Analytics" token — real MCX SILVERM
          # price/OI/options/IV + silver history. Preferred MCX source.
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          # Free market-data key (Twelve Data) — gold/USD-INR history.
          TWELVEDATA_KEY: ${{ secrets.TWELVEDATA_KEY }}
          # Optional enhancements — set as repo secrets if you use them.
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_ACCESS_TOKEN: ${{ secrets.KITE_ACCESS_TOKEN }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
        run: node scripts/build-data.mjs

      - name: Commit if changed
        run: |
          git config user.name "sliver-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain public/data)" ]; then
            git add public/data
            git commit -m "data: refresh MCX snapshot [skip ci]"
            git push
          else
            echo "No data changes."
          fi
